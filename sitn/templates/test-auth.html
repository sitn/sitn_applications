<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test authentification</title>
  <style>
    body {
      font-family: "Barlow", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
    }

    body>div:first-of-type,
    body>h1:first-of-type {
      display: none;
    }

    .ne-login {
      display: grid;
      grid-template-columns: auto;
      justify-content: center;
      align-items: center;
      height: 50vh;
    }

    .login-form {
      text-align: center;
    }

    button {
      background-color: #007C64;
      border-style: none;
      border-radius: 2.5rem;
      font-size: 1rem;
      color: white;
      padding: 1rem;
      cursor: pointer;
      align-items: center;
      margin-top: 2rem;
    }

    button:hover {
      background-color: #036250;
    }
  </style>
</head>

<body>
  {% load allauth socialaccount %}
  {% if request.user.is_authenticated %}
  <h3>Vous êtes connecté</h3>
  <h4>WELCOME {{ request.user }}</h4>
  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit">Log Out</button>
  </form>

  {% else %}
  <h3>Vous n'êtes pas connecté</h3>
  <form action="{% provider_login_url 'dotnetid' process='login' %}" method="POST">
    {% csrf_token %}
    <button type="submit" href="{% provider_login_url 'dotnetid' %}">
      Me connecter
    </button>
  </form>
  {% endif %}
</body>

</html>
