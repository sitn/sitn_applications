{% extends "allauth/layouts/base.html" %}
{% block extra_head %}
<style>
  body {
    font-family: "Barlow", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  }

  body>div:first-of-type,
  body>h1:first-of-type {
    display: none;
  }

  .ne-login {
    display: grid;
    grid-template-columns: auto;
    justify-content: center;
    align-items: center;
    height: 50vh;
  }

  .login-form {
    text-align: center;
  }

  button {
    background-color: #007C64;
    border-style: none;
    border-radius: 2.5rem;
    font-size: 1rem;
    color: white;
    padding: 1rem;
    cursor: pointer;
    align-items: center;
    margin-top: 2rem;
  }

  button:hover {
    background-color: #036250;
  }
</style>
{% endblock %}
