{% load static %}<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}" />
    <title>SITN RoadView</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }
      pnx-photo-viewer {
        width: 100%;
        height: 100%;
        --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
    </style>
    <script type="module" src="{% static 'panoview/vendor/panoramax-web-viewer.photoviewer.bundle.js' %}"></script>
  </head>

  <body>
    <pnx-photo-viewer id="roadview"></pnx-photo-viewer>
  </body>

  <script type="module">
    const stacEndpoint = "{{ stac_endpoint|escapejs }}";
    const currentImageName = "{{ picture_id|escapejs }}";
    const sequenceId = "{{ sequence_id|escapejs }}";

    const viewer = document.getElementById('roadview');
    viewer.setAttribute('endpoint', stacEndpoint);
    viewer.setAttribute('sequence', sequenceId);
    viewer.setAttribute('picture', currentImageName);

    // Keep browser URL path in sync with the currently displayed picture.
    viewer.addEventListener('select', (e) => {
      const picId = e.detail.picId;
      if (!picId || picId === currentImageName) {
        return;
      }
      const newPath = window.location.pathname.replace(/[^/]+$/, encodeURIComponent(picId));
      window.history.pushState(picId, picId, newPath + window.location.search);
    });
  </script>
</html>
